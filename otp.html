<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .otp-input {
      width: 45px;
      height: 50px;
      text-align: center;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .otp-input:focus {
      outline: none;
      border-color: #2d1a12;
    }
  </style>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md text-center">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-[#2d1a12] mb-2">
      Enter OTP
    </h2>

    <p class="text-sm text-gray-500 mb-6">
      Enter the 6-digit code sent to your email
    </p>

    <!-- FORM -->
    <form action="newpassword.html" onsubmit="return checkOtp()" class="space-y-5">

      <!-- OTP INPUTS -->
      <div class="flex justify-between gap-2">
        <input maxlength="1" class="otp-input"/>
        <input maxlength="1" class="otp-input"/>
        <input maxlength="1" class="otp-input"/>
        <input maxlength="1" class="otp-input"/>
        <input maxlength="1" class="otp-input"/>
        <input maxlength="1" class="otp-input"/>
      </div>

      <!-- Error -->
      <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

      <!-- Button -->
      <button 
        id="continueBtn"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Continue
      </button>

    </form>

    <!-- Resend -->
    <p class="text-sm mt-4">
      Didn’t receive code?
      <span id="resendBtn" class="text-gray-400 cursor-not-allowed">
        Resend (30s)
      </span>
    </p>

  </div>

  <!-- SCRIPT -->
  <script>
    const inputs = document.querySelectorAll(".otp-input");
    const error = document.getElementById("errorMsg");
    const btn = document.getElementById("continueBtn");

    // Auto move forward
    inputs.forEach((input, index) => {
      input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      // Backspace go back
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // Paste OTP
    document.addEventListener("paste", (e) => {
      const paste = e.clipboardData.getData("text").slice(0, 6);
      if (!paste) return;

      inputs.forEach((input, i) => {
        input.value = paste[i] || "";
      });
    });

    function checkOtp() {
      let otp = "";
      inputs.forEach(input => otp += input.value);

      error.classList.add("hidden");

      if (otp.length < 6) {
        error.innerText = "Please enter complete OTP";
        error.classList.remove("hidden");
        return false;
      }

      // Loading state
      btn.innerText = "Verifying...";
      btn.disabled = true;

      return true;
    }

    // Resend timer
    let timeLeft = 30;
    const resendBtn = document.getElementById("resendBtn");

    const timer = setInterval(() => {
      timeLeft--;
      resendBtn.innerText = `Resend (${timeLeft}s)`;

      if (timeLeft <= 0) {
        clearInterval(timer);
        resendBtn.innerText = "Resend";
        resendBtn.classList.remove("text-gray-400", "cursor-not-allowed");
        resendBtn.classList.add("text-[#2d1a12]", "cursor-pointer");

        resendBtn.onclick = () => {
          alert("OTP resent!");
          location.reload();
        };
      }
    }, 1000);
  </script>

</body>
</html>
