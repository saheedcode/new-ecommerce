
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwello Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>



<!-- FORGOT PASSWORD FORM -->
<form id="forgotForm" class="space-y-4 hidden">

  <div>
    <label class="text-sm text-gray-600">Email</label>
    <input type="email" placeholder="Enter your email"
      class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
  </div>

  <button class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
    Reset Password
  </button>

  <p class="text-xs text-center text-gray-500 mt-4">
    Remember your password?
    <span onclick="showLogin()" class="text-[#2d1a12] font-medium cursor-pointer">
      Back to Login
    </span>
  </p>

</form>

<script>
 function showForgot() {
  document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('forgotForm').classList.remove('hidden');

  document.getElementById('formTitle').innerText = "Reset Password";
  document.getElementById('toggleText').innerHTML = "";
}
</script> 
</body>
</html>
