<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dwello Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-md">

  <!-- Title -->
  <h2 id="formTitle" class="text-2xl font-bold text-center text-[#2d1a12] mb-6">
    Create Your Account
  </h2>

  <!-- SIGNUP FORM -->
  <form id="signupForm" onsubmit="event.preventDefault()" class="space-y-4">
    <div>
      <label class="text-sm text-gray-600">Full Name</label>
      <input type="text" class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <div>
      <label class="text-sm text-gray-600">Email</label>
      <input type="email" class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <div>
      <label class="text-sm text-gray-600">Password</label>
      <input type="password" class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <button class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Sign Up
    </button>
  </form>

  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="event.preventDefault()" class="space-y-4 hidden">
    <div>
      <label class="text-sm text-gray-600">Email</label>
      <input type="email" class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <div>
      <label class="text-sm text-gray-600">Password</label>
      <input type="password" class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <div class="text-right">
      <span onclick="showForgot()" class="text-sm text-[#2d1a12] cursor-pointer hover:underline">
        Forgot Password?
      </span>
    </div>

    <button class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Login
    </button>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form id="forgotForm" onsubmit="event.preventDefault()" class="space-y-4 hidden">
    <div>
      <label class="text-sm text-gray-600">Email</label>
      <input type="email" id="resetEmail"
        class="w-full mt-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-[#2d1a12]" />
    </div>

    <button type="button" onclick="handleReset()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Reset Password
    </button>

    <p class="text-xs text-center text-gray-500 mt-4">
      Remember your password?
      <span onclick="showLogin()" class="text-[#2d1a12] cursor-pointer font-medium">
        Back to Login
      </span>
    </p>
  </form>

  <!-- SUCCESS MESSAGE -->
  <div id="successMessage" class="hidden text-center space-y-4">
    <h3 class="text-xl font-semibold text-[#2d1a12]">
      Check your email
    </h3>
    <p class="text-sm text-gray-600">
      We’ve sent a password reset link to your email address.
    </p>

    <button onclick="showLogin()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Back to Login
    </button>
  </div>

  <!-- TOGGLE TEXT -->
  <p id="toggleText" class="text-xs text-center text-gray-500 mt-4">
    Already have an account?
    <span onclick="showLogin()" class="text-[#2d1a12] font-medium cursor-pointer">
      Login
    </span>
  </p>

</div>

<script>
function showLogin() {
  signupForm.classList.add('hidden');
  loginForm.classList.remove('hidden');
  forgotForm.classList.add('hidden');
  successMessage.classList.add('hidden');

  formTitle.innerText = "Welcome Back";

  toggleText.innerHTML =
    `Don't have an account?
     <span onclick="showSignup()" class="text-[#2d1a12] cursor-pointer">Sign Up</span>`;
}

function showSignup() {
  signupForm.classList.remove('hidden');
  loginForm.classList.add('hidden');
  forgotForm.classList.add('hidden');
  successMessage.classList.add('hidden');

  formTitle.innerText = "Create Your Account";

  toggleText.innerHTML =
    `Already have an account?
     <span onclick="showLogin()" class="text-[#2d1a12] cursor-pointer">Login</span>`;
}

function showForgot() {
  signupForm.classList.add('hidden');
  loginForm.classList.add('hidden');
  forgotForm.classList.remove('hidden');
  successMessage.classList.add('hidden');

  formTitle.innerText = "Reset Password";
  toggleText.innerHTML = "";
}

function handleReset() {
  const email = document.getElementById("resetEmail").value;

  if (!email) {
    alert("Please enter your email");
    return;
  }

  // simulate success
  forgotForm.classList.add('hidden');
  successMessage.classList.remove('hidden');
  formTitle.innerText = "Success";
}
</script>

</body>
</html>
