
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-[#2d1a12] mb-6">
      Welcome Back
    </h2>

    <!-- LOGIN FORM -->
    <form onsubmit="return handleLogin()" class="space-y-4">

      <!-- Email -->
      <input 
        type="email" 
        id="email"
        placeholder="Email" 
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]"
      />

      <!-- Password -->
      <div class="relative">
        <input 
          type="password" 
          id="password"
          placeholder="Password" 
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]"
        />
        <span onclick="togglePassword()" 
          class="absolute right-4 top-3 cursor-pointer text-sm text-gray-500">
          Show
        </span>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex justify-between items-center text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="remember"/>
          Remember me
        </label>

        <a href="forgotpassword.html" class="text-[#2d1a12]">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <button 
        id="loginBtn"
        type="submit"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Login
      </button>

    </form>

    <!-- SIGNUP LINK -->
    <p class="text-xs text-center mt-4">
      Don’t have an account?
      <a href="sign.html" class="text-[#2d1a12]">Sign Up</a>
    </p>

  </div>

  <!-- SCRIPT -->
  <script>
    function togglePassword() {
      const input = document.getElementById("password");
      input.type = input.type === "password" ? "text" : "password";
    }

    function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");

      // Validation
      if (!email || !password) {
        alert("Please fill all fields");
        return false;
      }

      // Fake login check (you can upgrade later)
      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
      }

      // Loading state
      btn.innerText = "Logging in...";
      btn.disabled = true;

      // Simulate success
      setTimeout(() => {
        alert("Login Successful!");
        window.location.href = "index.html"; // change to dashboard later
      }, 1000);

      return false; // prevent instant reload
    }
  </script>

</body>
</html>
