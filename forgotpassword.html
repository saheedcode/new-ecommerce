<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-[#2d1a12] mb-4">
      Reset Password
    </h2>

    <p class="text-sm text-gray-500 text-center mb-6">
      Enter your email and we’ll send you a verification code
    </p>

    <!-- FORM -->
    <form action="otp.html" onsubmit="return validateEmail()" class="space-y-4">

      <!-- Email -->
      <input 
        type="email" 
        id="email"
        placeholder="Enter your email"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]"
      />

      <!-- Error Message -->
      <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

      <!-- Button -->
      <button 
        id="resetBtn"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Send Code
      </button>

    </form>

    <!-- Back to login -->
    <p class="text-xs text-center mt-4">
      Remember your password?
      <a href="login.html" class="text-[#2d1a12]">Login</a>
    </p>

  </div>

  <!-- SCRIPT -->
  <script>
    function validateEmail() {
      const email = document.getElementById("email").value.trim();
      const error = document.getElementById("errorMsg");
      const btn = document.getElementById("resetBtn");

      // Reset error
      error.classList.add("hidden");

      // Check empty
      if (!email) {
        error.innerText = "Please enter your email";
        error.classList.remove("hidden");
        return false;
      }

      // Email format check
      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
      if (!email.match(emailPattern)) {
        error.innerText = "Enter a valid email address";
        error.classList.remove("hidden");
        return false;
      }

      // Loading state
      btn.innerText = "Sending...";
      btn.disabled = true;

      return true; // go to otp.html
    }
  </script>

</body>
</html>
