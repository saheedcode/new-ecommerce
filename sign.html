
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dwello Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .otp-input {
      width: 45px;
      height: 50px;
      text-align: center;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .otp-input:focus {
      outline: none;
      border-color: #2d1a12;
    }
  </style>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-md relative">

  <!-- BACK BUTTON -->
  <div id="backButton" class=" absolute top-2 left-5">
    <button onclick="goHome()" class="text-[#2d1a12] text-2xl font-bold">
      ←
    </button>
  </div>

  <!-- Title -->
  <h2 id="formTitle" class="text-2xl font-bold text-center text-[#2d1a12] mb-6">
    Create Your Account
  </h2>

  <!-- SIGNUP -->
  <form id="signupForm" class="space-y-4">
    <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg border"/>
    <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg border"/>
    <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border"/>
    <button class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">Sign Up</button>
  </form>

  <!-- LOGIN -->
  <form id="loginForm" class="space-y-4 hidden">
    <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg border"/>
    <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border"/>

    <div class="text-right">
      <span onclick="showForgot()" class="text-sm cursor-pointer text-[#2d1a12]">Forgot Password?</span>
    </div>

    <button class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">Login</button>
  </form>

  <!-- FORGOT -->
  <form id="forgotForm" class="space-y-4 hidden">
    <input type="email" id="resetEmail" placeholder="Enter your email"
      class="w-full px-4 py-3 rounded-lg border"/>

    <button type="button" onclick="handleReset()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Reset Password
    </button>

    <p class="text-xs text-center">
      <span onclick="showLogin()" class="cursor-pointer text-[#2d1a12]">Back to Login</span>
    </p>
  </form>

  <!-- OTP -->
  <form id="otpForm" class="space-y-4 hidden">
    <p class="text-sm text-center text-gray-600">
      Enter the 6-digit code sent to your email
    </p>

    <div class="flex justify-between gap-2">
      <input maxlength="1" class="otp-input"/>
      <input maxlength="1" class="otp-input"/>
      <input maxlength="1" class="otp-input"/>
      <input maxlength="1" class="otp-input"/>
      <input maxlength="1" class="otp-input"/>
      <input maxlength="1" class="otp-input"/>
    </div>

    <button type="button" onclick="goToNewPassword()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Continue
    </button>

    <p class="text-xs text-center">
      Didn’t receive code?
      <span onclick="resendOtp()" class="text-[#2d1a12] cursor-pointer">Resend</span>
    </p>
  </form>

  <!-- NEW PASSWORD -->
  <form id="newPasswordForm" class="space-y-4 hidden">
    <input type="password" placeholder="New Password"
      class="w-full px-4 py-3 rounded-lg border"/>

    <input type="password" placeholder="Confirm Password"
      class="w-full px-4 py-3 rounded-lg border"/>

    <button type="button" onclick="resetPassword()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Update Password
    </button>
  </form>

  <!-- SUCCESS -->
  <div id="successMessage" class="hidden text-center space-y-4">
    <h3 class="text-xl font-semibold text-[#2d1a12]">Success</h3>
    <p class="text-sm text-gray-600">
      Your password has been updated.
    </p>

    <button onclick="showLogin()"
      class="w-full bg-[#2d1a12] text-white py-3 rounded-lg">
      Back to Login
    </button>
  </div>

  <!-- TOGGLE -->
  <p id="toggleText" class="text-xs text-center mt-4">
    Already have an account?
    <span onclick="showLogin()" class="cursor-pointer text-[#2d1a12]">Login</span>
  </p>

</div>

<script src="sign.js">

  
</script>

</body>
</html>
