





<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwello - Find Your Dream Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f7f4f2] text-gray-800">

<!-- Sign Up Section -->


<section id="signup" class="bg-[#f5f2ef] py-20 px-4">
  <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-md">

    <h2 class="text-2xl font-bold text-center text-[#2d1a12] mb-6">
      Create Your Account
    </h2>

    <form class="space-y-4">

      <!-- Name -->
      <div>
        <label class="text-sm text-gray-600">Full Name</label>
        <input type="text" placeholder="Enter your name"
          class="w-full mt-1 px-4 py-3 rounded-lg border outline-none focus:ring-2 focus:ring-[#2d1a12]" />
      </div>

      <!-- Email -->
      <div>
        <label class="text-sm text-gray-600">Email</label>
        <input type="email" placeholder="Enter your email"
          class="w-full mt-1 px-4 py-3 rounded-lg border outline-none focus:ring-2 focus:ring-[#2d1a12]" />
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm text-gray-600">Password</label>
        <input type="password" placeholder="Enter your password"
          class="w-full mt-1 px-4 py-3 rounded-lg border outline-none focus:ring-2 focus:ring-[#2d1a12]" />
      </div>

      <!-- Button -->
      <button type="submit"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg mt-4 hover:opacity-90 transition">
        Sign Up
      </button>

    </form>

    <p class="text-xs text-center text-gray-500 mt-4">
      Already have an account? <span class="text-[#2d1a12] font-medium cursor-pointer">Login</span>
    </p>

  </div>
</section>

</body>
