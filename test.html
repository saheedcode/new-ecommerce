
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

  <div class="bg-white w-full max-w-lg p-6 rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

    <form id="signupForm" class="space-y-4">

      <!-- First & Last Name -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="firstName" type="text" placeholder="First Name"
          class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

        <input id="lastName" type="text" placeholder="Last Name"
          class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Email -->
      <input id="email" type="email" placeholder="Email Address"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <!-- Phone Number -->
      <input id="phoneNumber" type="tel" placeholder="Phone Number"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <!-- Password -->
      <input id="password" type="password" placeholder="Password"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <!-- Confirm Password -->
      <input id="confirmPassword" type="password" placeholder="Confirm Password"
        class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

      <!-- Terms -->
      <div class="flex items-center gap-2">
        <input id="terms" type="checkbox" class="w-4 h-4">
        <label for="terms" class="text-sm text-gray-600">
          I agree to the Terms & Conditions
        </label>
      </div>

      <!-- Button + Status -->
      <div class="flex items-center gap-3">
        <button id="submitBtn" type="submit"
          class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">
          Sign Up
        </button>

        <span id="statusMsg" class="text-sm font-medium"></span>
      </div>

      <!-- Login Redirect -->
      <p class="text-sm text-center text-gray-600">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-medium">Login</a>
      </p>

    </form>
  </div>

  <script>
    const firstName = document.getElementById('firstName')
    const lastName = document.getElementById('lastName')
    const email = document.getElementById('email')
    const phoneNumber = document.getElementById('phoneNumber')
    const password = document.getElementById('password')
    const confirmPassword = document.getElementById('confirmPassword')
    const termsAccepted = document.getElementById('terms')
    const signupForm = document.getElementById('signupForm')
    const submitBtn = document.getElementById('submitBtn')
    const statusMsg = document.getElementById('statusMsg')

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault()

      const firstNameVal = firstName.value.trim()
      const lastNameVal = lastName.value.trim()
      const emailVal = email.value.trim()
      const phoneNumberVal = phoneNumber.value.trim()
      const passwordVal = password.value
      const confirmPasswordVal = confirmPassword.value
      const termAcceptedVal = termsAccepted.checked

      // VALIDATION
      if (firstNameVal.length < 2 || lastNameVal.length < 2) {
        return alert("First Name and Last Name must be at least 2 characters")
      }

      if (!passwordVal || !confirmPasswordVal) {
        return alert("Please enter your password")
      }

      if (passwordVal !== confirmPasswordVal) {
        return alert("Passwords do not match")
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
      if (!emailRegex.test(emailVal)) {
        return alert("Please enter a valid email")
      }

      if (phoneNumberVal.length !== 11 || isNaN(phoneNumberVal)) {
        return alert("Enter a valid 11-digit phone number")
      }

      if (!termAcceptedVal) {
        return alert("You must agree to the terms")
      }

      // 🔄 PROCESSING STATE
      submitBtn.textContent = "Processing..."
      submitBtn.disabled = true
      submitBtn.classList.add("opacity-50", "cursor-not-allowed")

      // ⏳ SIMULATE SERVER DELAY
      setTimeout(() => {

        // SAVE DATA
        const userinfo = {
          fName: firstNameVal,
          lName: lastNameVal,
          email: emailVal,
          phone: phoneNumberVal,
          password: passwordVal
        }

        localStorage.setItem('userInfo', JSON.stringify(userinfo))

        // ✅ SUCCESS STATE
        submitBtn.textContent = "Success"
        submitBtn.classList.remove("bg-blue-600")
        submitBtn.classList.add("bg-green-600")

        statusMsg.textContent = "Signup successful✅"
        statusMsg.classList.add("text-gray-600 text-5")

        // 🔁 REDIRECT AFTER 2 SECONDS
        setTimeout(() => {
          window.location.href = "login.html"
        }, 2000)

      }, 1500)
    })
  </script>

</body>
</html>
