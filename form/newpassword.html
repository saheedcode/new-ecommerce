<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create New Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-[#2d1a12] mb-4">
      Create New Password
    </h2>

    <p class="text-sm text-gray-500 text-center mb-6">
      Your new password must be different from previous ones
    </p>

    <!-- FORM -->
    <form action="success.html" onsubmit="return validatePassword()" class="space-y-4">

      <!-- New Password -->
      <div class="relative">
        <input 
          type="password" 
          id="password"
          placeholder="New Password"
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]"
        />
        <span onclick="togglePassword('password')" 
          class="absolute right-4 top-3 cursor-pointer text-sm text-gray-500">
          Show
        </span>
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <input 
          type="password" 
          id="confirm"
          placeholder="Confirm Password"
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]"
        />
        <span onclick="togglePassword('confirm')" 
          class="absolute right-4 top-3 cursor-pointer text-sm text-gray-500">
          Show
        </span>
      </div>

      <!-- Error Message -->
      <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

      <!-- Button -->
      <button 
        id="updateBtn"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Update Password
      </button>

    </form>

  </div>

  <!-- SCRIPT -->
  <script src="newpassword.js">
   
  </script>

</body>
</html>
