<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-[#2d1a12] mb-6">
      Create Your Account
    </h2>

    <!-- FORM -->
    <form id="signupForm" class="space-y-4">

      <input id="firstName" type="text" placeholder="First Name"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />

      <input id="lastName" type="text" placeholder="Last Name"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />

      <input id="email" type="email" placeholder="Email"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />

      <input id="phoneNumber" type="text" placeholder="Phone Number"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />

      <input id="password" type="password" placeholder="Password"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />

      <input id="confirmPassword" type="password" placeholder="Confirm Password"
        class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-[#2d1a12]" />


         

      <!-- Terms -->
      <div class="flex items-start gap-2 text-sm">
        <input id="terms" type="checkbox" class="mt-1"/>
        <label class="text-gray-600">
          I agree to the 
          <span class="text-[#2d1a12] font-medium underline">Terms & Conditions</span> 
          and 
          <span class="text-[#2d1a12] font-medium underline">Privacy Policy</span>
        </label>
      </div>

      <!-- Button -->
      <button id="submitBtn"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Sign Up
      </button>

      <!-- Status -->
      <p id="statusMsg" class="text-center text-sm"></p>

    </form>

    <!-- Login Link -->
    <p class="text-xs text-center mt-4">
      Already have an account?
      <a href="login.html" class="text-[#2d1a12]">Login</a>
    </p>

  </div>

  <!-- SCRIPT -->
  <script src="sign.js">
 
  </script>

</body>
</html>
