<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f4f2] flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md text-center space-y-5">

    <!-- Success Icon -->
    <div class="flex justify-center">
      <div class="w-16 h-16 flex items-center justify-center rounded-full bg-green-100">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-[#2d1a12]">
      Password Updated!
    </h2>

    <!-- Message -->
    <p class="text-sm text-gray-600">
      Your password has been successfully changed. You can now log in with your new password.
    </p>

    <!-- Button -->
    <a href="login.html">
      <button 
        id="loginBtn"
        class="w-full bg-[#2d1a12] text-white py-3 rounded-lg hover:opacity-90 transition">
        Back to Login
      </button>
    </a>

    <!-- Auto redirect note -->
    <p id="redirectText" class="text-xs text-gray-400">
      Redirecting to login in 5 seconds...
    </p>

  </div>

  <!-- SCRIPT -->
  <script src="success.js">
  
  </script>

</body>
</html>
